<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CleanTrack</title>
  <link rel="icon" type="image/png" href="/CleanTrack.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g900: #0a2e1a; --g800: #145a38; --g700: #1a7a4a;
      --g600: #22a05f; --g500: #2dc46e; --g400: #4dd882;
      --g300: #7ee8a2; --g100: #d6f5e3; --g50: #edfaf3;
      --lime: #a8e63d; --white: #fff;
      --gray100: #f4f6f4; --gray200: #e5ebe5;
      --gray400: #9aaa9a; --gray600: #5a6b5a; --gray800: #2c3a2c;
      --danger: #e84c4c; --warn: #f5a623;
      --font: 'Nunito', sans-serif;
      --r-sm: 10px; --r-md: 16px; --r-lg: 24px; --r-xl: 32px;
      --sh-sm: 0 2px 8px rgba(13,51,32,.08);
      --sh-md: 0 4px 20px rgba(13,51,32,.12);
      --sh-lg: 0 8px 40px rgba(13,51,32,.18);
    }

    html, body, #root { height: 100%; background: var(--gray100); font-family: var(--font); color: var(--gray800); -webkit-font-smoothing: antialiased; }

    .shell { max-width: 430px; min-height: 100dvh; margin: 0 auto; background: var(--white); position: relative; display: flex; flex-direction: column; overflow: hidden; }

    .page { flex: 1; overflow-y: auto; padding-bottom: 80px; }
    .page-full { flex: 1; overflow-y: auto; }

    button { cursor: pointer; font-family: var(--font); border: none; outline: none; }
    input, textarea { font-family: var(--font); outline: none; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scaleIn { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
    @keyframes pulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.15); opacity:.7; } }
    @keyframes truckFloat { 0%,100% { transform:translateX(-6px); } 50% { transform:translateX(6px); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* ── ONBOARDING ── */
    .onboard { min-height:100dvh; display:flex; flex-direction:column; position:relative; overflow:hidden; }
    .ob-slides { flex:1; display:flex; transition:transform .4s cubic-bezier(.4,0,.2,1); }
    .ob-slide { min-width:100%; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:0 0 48px; position:relative; overflow:hidden; }
    .ob-slide-0 { background:linear-gradient(160deg,var(--g800) 0%,var(--g600) 60%,var(--g400) 100%); }
    .ob-slide-1 { background:linear-gradient(160deg,#0d3d28 0%,var(--g700) 60%,var(--g500) 100%); }
    .ob-slide-2 { background:linear-gradient(160deg,#1a5c3a 0%,var(--g600) 60%,var(--g300) 100%); }
    .ob-slide-3 { background:linear-gradient(160deg,var(--g900) 0%,var(--g800) 60%,var(--g600) 100%); }
    .blob { position:absolute; border-radius:50%; filter:blur(60px); opacity:.22; pointer-events:none; }
    .blob1 { width:300px; height:300px; background:var(--lime); top:-80px; right:-80px; }
    .blob2 { width:200px; height:200px; background:var(--g300); bottom:100px; left:-60px; }
    .ob-top { width:100%; display:flex; justify-content:flex-end; padding:52px 24px 0; }
    .ob-skip { background:rgba(255,255,255,.2); color:white; border:none; padding:8px 16px; border-radius:100px; font-size:.82rem; font-weight:700; }
    .ob-illus { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; }
    .ob-illus-ring { width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,.12); border:2px solid rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:5rem; }
    .ob-text { text-align:center; padding:0 32px; display:flex; flex-direction:column; gap:10px; }
    .ob-text h2 { font-size:1.7rem; font-weight:900; color:white; letter-spacing:-.5px; line-height:1.2; }
    .ob-text p { font-size:.95rem; color:rgba(255,255,255,.8); line-height:1.55; font-weight:500; }
    .ob-bottom { width:100%; padding:0 24px; display:flex; flex-direction:column; gap:16px; align-items:center; }
    .ob-dots { display:flex; gap:8px; }
    .ob-dot { width:8px; height:8px; border-radius:100px; background:rgba(255,255,255,.35); transition:all .3s; }
    .ob-dot.on { width:24px; background:white; }
    .ob-btn { width:100%; padding:16px; background:white; color:var(--g800); border-radius:var(--r-lg); font-size:1rem; font-weight:900; box-shadow:0 4px 20px rgba(0,0,0,.15); transition:transform .15s; }
    .ob-btn:active { transform:scale(.97); }
    .ob-sub { display:flex; gap:6px; font-size:.88rem; color:rgba(255,255,255,.75); font-weight:600; }
    .ob-sub span { color:white; font-weight:800; cursor:pointer; text-decoration:underline; text-underline-offset:2px; }
    .truck-anim { animation:truckFloat 3s ease-in-out infinite; }
    .btn-white { width:100%; padding:16px; background:white; color:var(--g800); border-radius:var(--r-lg); font-size:1rem; font-weight:900; box-shadow:0 4px 20px rgba(0,0,0,.15); transition:transform .15s; }
    .btn-white:active { transform:scale(.97); }
    .btn-outline { width:100%; padding:16px; background:transparent; color:white; border-radius:var(--r-lg); font-size:1rem; font-weight:700; border:2px solid rgba(255,255,255,.4); transition:background .15s; }
    .btn-outline:active { background:rgba(255,255,255,.1); }

    /* ── AUTH ── */
    .auth-page { min-height:100dvh; background:var(--gray100); display:flex; flex-direction:column; }
    .auth-hdr { position:relative; background:linear-gradient(135deg,var(--g800),var(--g600)); padding:56px 28px 36px; overflow:hidden; }
    .auth-hdr-blob { position:absolute; width:200px; height:200px; background:rgba(255,255,255,.08); border-radius:50%; top:-60px; right:-40px; }
    .back-btn { background:rgba(255,255,255,.2); border-radius:50%; width:38px; height:38px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; }
    .auth-hdr h2 { font-size:1.8rem; font-weight:900; color:white; letter-spacing:-.5px; }
    .auth-hdr p { color:rgba(255,255,255,.75); font-size:.95rem; margin-top:4px; }
    .auth-body { flex:1; padding:24px 20px; }
    .auth-card { background:white; border-radius:var(--r-xl); padding:28px 24px; box-shadow:var(--sh-md); display:flex; flex-direction:column; gap:16px; animation:scaleIn .35s ease both; }
    .fg { display:flex; flex-direction:column; gap:6px; }
    .fg label { font-size:.8rem; font-weight:700; color:var(--gray600); text-transform:uppercase; letter-spacing:.5px; }
    .fg input { padding:14px 16px; border:2px solid var(--gray200); border-radius:var(--r-md); font-size:1rem; color:var(--gray800); background:var(--gray100); transition:border-color .2s,background .2s; }
    .fg input:focus { border-color:var(--g500); background:white; }
    .form-err { color:var(--danger); font-size:.85rem; font-weight:700; text-align:center; }
    .btn-green { width:100%; padding:16px; background:linear-gradient(135deg,var(--g700),var(--g500)); color:white; border-radius:var(--r-lg); font-size:1rem; font-weight:900; box-shadow:0 4px 16px rgba(34,160,95,.35); transition:transform .15s; margin-top:4px; }
    .btn-green:active { transform:scale(.97); }
    .auth-switch { text-align:center; font-size:.9rem; color:var(--gray600); }
    .auth-switch span { color:var(--g700); font-weight:700; cursor:pointer; text-decoration:underline; text-underline-offset:2px; }

    /* ── HOME ── */
    .home-hdr { background:linear-gradient(135deg,var(--g800),var(--g600)); padding:52px 24px 24px; display:flex; justify-content:space-between; align-items:flex-start; }
    .home-hdr-text p { color:rgba(255,255,255,.8); font-size:.9rem; font-weight:600; margin-bottom:4px; }
    .home-hdr-text h1 { font-size:1.8rem; font-weight:900; color:white; letter-spacing:-.5px; }
    .notif-btn { position:relative; width:42px; height:42px; background:rgba(255,255,255,.15); border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .notif-dot { position:absolute; top:8px; right:8px; width:8px; height:8px; background:var(--lime); border-radius:50%; border:1.5px solid var(--g700); animation:pulse 2s infinite; }
    .pickup-bar { margin:0 16px; background:white; border-radius:0 0 var(--r-lg) var(--r-lg); padding:16px 20px; display:flex; align-items:center; gap:14px; box-shadow:var(--sh-sm); }
    .pickup-bar .pu-label { font-size:.75rem; color:var(--gray400); font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
    .pickup-bar .pu-time { font-size:1rem; font-weight:900; color:var(--gray800); }
    .pu-badge { margin-left:auto; background:var(--g100); color:var(--g700); font-size:.75rem; font-weight:700; padding:4px 10px; border-radius:100px; }
    .sec { padding:20px 16px 0; }
    .sec-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .sec-hdr h2 { font-size:1.1rem; font-weight:900; color:var(--gray800); }
    .live-badge { display:flex; align-items:center; gap:5px; background:var(--g100); color:var(--g700); font-size:.7rem; font-weight:800; padding:4px 10px; border-radius:100px; letter-spacing:.5px; }
    .live-dot { width:6px; height:6px; background:var(--g500); border-radius:50%; animation:pulse 1.5s infinite; }
    .map-wrap { background:white; border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--sh-sm); position:relative; }
    .map-svg { width:100%; height:240px; display:block; }
    .truck-popup { position:absolute; bottom:44px; left:50%; transform:translateX(-50%); background:white; border-radius:var(--r-md); padding:12px 16px; box-shadow:var(--sh-lg); min-width:160px; animation:scaleIn .2s ease; border:1.5px solid var(--g100); }
    .tp-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .tp-name { font-weight:900; font-size:.95rem; color:var(--g800); }
    .tp-hdr button { background:none; font-size:.8rem; color:var(--gray400); }
    .tp-status { font-size:.8rem; color:var(--g600); font-weight:700; }
    .tp-eta { font-size:.85rem; color:var(--gray600); margin-top:2px; }
    .map-legend { display:flex; gap:16px; padding:10px 14px; background:var(--gray100); border-top:1px solid var(--gray200); }
    .leg { display:flex; align-items:center; gap:6px; font-size:.78rem; font-weight:700; color:var(--gray600); }
    .leg-dot { width:10px; height:10px; border-radius:50%; }
    .quick-sec { padding:20px 16px; }
    .quick-sec h2 { font-size:1.1rem; font-weight:900; color:var(--gray800); margin-bottom:12px; }
    .rpt-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .rpt-card { background:white; border-radius:var(--r-lg); padding:20px 16px; display:flex; flex-direction:column; align-items:center; gap:10px; box-shadow:var(--sh-sm); font-size:.85rem; font-weight:700; color:var(--gray800); border:2px solid transparent; transition:transform .15s,border-color .15s; }
    .rpt-card:active { transform:scale(.96); border-color:var(--g300); }
    .rpt-icon { font-size:1.8rem; }

    /* ── REPORT ── */
    .rp-hdr { background:linear-gradient(135deg,var(--g800),var(--g600)); padding:52px 24px 24px; }
    .rp-hdr h1 { font-size:1.8rem; font-weight:900; color:white; letter-spacing:-.5px; margin-bottom:16px; }
    .steps { display:flex; align-items:center; gap:0; }
    .step-dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.3); transition:background .3s; }
    .step-dot.on { background:white; }
    .step-line { flex:1; height:2px; background:rgba(255,255,255,.25); margin:0 8px; }
    .rp-body { padding:20px 16px; display:flex; flex-direction:column; gap:16px; animation:fadeUp .3s ease both; }
    .step-lbl { font-size:.8rem; font-weight:700; color:var(--gray400); text-transform:uppercase; letter-spacing:.5px; }
    .type-list { display:flex; flex-direction:column; gap:10px; }
    .type-card { background:white; border-radius:var(--r-lg); padding:16px; display:flex; align-items:center; gap:14px; box-shadow:var(--sh-sm); border:2px solid transparent; transition:border-color .2s,transform .15s; text-align:left; }
    .type-card.sel { border-color:var(--g400); background:var(--g50); }
    .type-card:active { transform:scale(.98); }
    .type-ico { font-size:1.8rem; min-width:36px; text-align:center; }
    .type-info { flex:1; }
    .type-info strong { font-size:.95rem; font-weight:900; color:var(--gray800); display:block; margin-bottom:2px; }
    .type-info p { font-size:.78rem; color:var(--gray400); line-height:1.3; }
    .chk { width:20px; display:flex; align-items:center; justify-content:center; }
    .next-btn { width:100%; padding:16px; border-radius:var(--r-lg); font-size:1rem; font-weight:900; background:var(--gray200); color:var(--gray400); transition:all .2s; margin-top:4px; }
    .next-btn.on { background:linear-gradient(135deg,var(--g700),var(--g500)); color:white; box-shadow:0 4px 16px rgba(34,160,95,.35); }
    .next-btn.on:active { transform:scale(.97); }
    .back-lnk { background:none; color:var(--g700); font-size:.9rem; font-weight:700; text-align:left; padding:0; }
    .sel-banner { background:var(--g100); border-radius:var(--r-md); padding:12px 16px; display:flex; align-items:center; gap:10px; font-weight:900; color:var(--g800); font-size:.95rem; }
    .sev-grp { display:flex; gap:8px; }
    .sev-btn { flex:1; padding:10px; border-radius:var(--r-md); font-size:.85rem; font-weight:700; background:white; border:2px solid var(--gray200); color:var(--gray600); transition:all .2s; }
    .sev-btn.low  { background:#e8f8e8; border-color:#4caf50; color:#2e7d32; }
    .sev-btn.med  { background:#fff8e1; border-color:#ffc107; color:#e65100; }
    .sev-btn.high { background:#fdecea; border-color:#e53935; color:#b71c1c; }
    .fg textarea { padding:14px 16px; border:2px solid var(--gray200); border-radius:var(--r-md); font-size:.95rem; color:var(--gray800); background:white; resize:none; transition:border-color .2s; width:100%; }
    .fg textarea:focus { border-color:var(--g400); }
    .success-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80dvh; padding:40px 32px; gap:16px; text-align:center; animation:fadeUp .4s ease both; }
    .success-ring { width:90px; height:90px; background:linear-gradient(135deg,var(--g700),var(--g500)); border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 30px rgba(34,160,95,.4); margin-bottom:8px; }
    .success-wrap h2 { font-size:1.6rem; font-weight:900; color:var(--g800); }
    .success-wrap p { color:var(--gray600); font-size:.95rem; line-height:1.5; }
    .ref-box { background:var(--g50); border-radius:var(--r-md); padding:12px 24px; display:flex; gap:8px; align-items:center; font-size:.9rem; color:var(--gray600); }
    .ref-box strong { color:var(--g700); font-size:1rem; }
    .btn-green2 { width:100%; padding:16px; background:linear-gradient(135deg,var(--g700),var(--g500)); color:white; border-radius:var(--r-lg); font-weight:900; font-size:1rem; }
    .btn-ghost2 { width:100%; padding:14px; background:transparent; color:var(--g700); border-radius:var(--r-lg); font-weight:700; font-size:1rem; border:2px solid var(--g300); }

    /* ── ACTIVITIES ── */
    .act-hdr { background:linear-gradient(135deg,var(--g800),var(--g600)); padding:52px 24px 24px; }
    .act-hdr h1 { font-size:1.8rem; font-weight:900; color:white; letter-spacing:-.5px; }
    .act-hdr p { color:rgba(255,255,255,.75); font-size:.9rem; margin-top:4px; margin-bottom:20px; }
    .stats-row { display:flex; gap:10px; }
    .stat-pill { flex:1; background:rgba(255,255,255,.18); border-radius:var(--r-md); padding:12px 8px; text-align:center; backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.2); }
    .stat-num { display:block; font-size:1.4rem; font-weight:900; color:white; }
    .stat-lbl { font-size:.7rem; color:rgba(255,255,255,.75); font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
    .filter-tabs { display:flex; gap:8px; padding:16px 16px 8px; overflow-x:auto; scrollbar-width:none; }
    .filter-tabs::-webkit-scrollbar { display:none; }
    .ftab { padding:8px 16px; border-radius:100px; font-size:.82rem; font-weight:700; white-space:nowrap; background:white; color:var(--gray600); box-shadow:var(--sh-sm); transition:background .2s,color .2s; }
    .ftab.on { background:var(--g700); color:white; }
    .act-list { padding:8px 16px 16px; display:flex; flex-direction:column; gap:10px; }
    .act-card { background:white; border-radius:var(--r-lg); padding:16px; display:flex; gap:14px; box-shadow:var(--sh-sm); animation:fadeUp .3s ease both; }
    .act-ico-wrap { width:44px; height:44px; min-width:44px; background:var(--g50); border-radius:var(--r-md); display:flex; align-items:center; justify-content:center; font-size:1.3rem; }
    .act-info { flex:1; min-width:0; }
    .act-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:4px; }
    .act-top strong { font-size:.9rem; font-weight:900; color:var(--gray800); }
    .sbadge { font-size:.68rem; font-weight:700; padding:3px 8px; border-radius:100px; white-space:nowrap; letter-spacing:.3px; }
    .s-pend { background:#fff3cd; color:#856404; }
    .s-prog { background:#cfe2ff; color:#084298; }
    .s-done { background:var(--g100); color:var(--g800); }
    .act-loc { font-size:.8rem; color:var(--gray600); margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .act-meta { display:flex; gap:12px; font-size:.75rem; color:var(--gray400); font-weight:600; }
    .empty { text-align:center; padding:48px 16px; color:var(--gray400); font-size:.9rem; }

    /* ── PROFILE ── */
    .prof-hdr { background:linear-gradient(135deg,var(--g800),var(--g600)); padding:52px 24px 40px; display:flex; flex-direction:column; align-items:center; gap:12px; }
    .prof-avatar { width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,.25); border:3px solid rgba(255,255,255,.5); display:flex; align-items:center; justify-content:center; font-size:2rem; }
    .prof-name { font-size:1.4rem; font-weight:900; color:white; letter-spacing:-.3px; }
    .prof-email { font-size:.85rem; color:rgba(255,255,255,.75); font-weight:600; }
    .prof-badge { background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.3); color:white; font-size:.75rem; font-weight:700; padding:4px 12px; border-radius:100px; margin-top:4px; }
    .prof-stats { display:flex; margin:0 16px; background:white; border-radius:var(--r-lg); padding:16px; box-shadow:var(--sh-sm); gap:0; margin-top:-20px; }
    .prof-stat { flex:1; text-align:center; border-right:1px solid var(--gray200); }
    .prof-stat:last-child { border-right:none; }
    .prof-stat-num { font-size:1.3rem; font-weight:900; color:var(--g700); display:block; }
    .prof-stat-lbl { font-size:.7rem; color:var(--gray400); font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
    .prof-section { padding:20px 16px 0; }
    .prof-section h3 { font-size:.8rem; font-weight:700; color:var(--gray400); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }
    .prof-menu-item { background:white; border-radius:var(--r-md); padding:16px; display:flex; align-items:center; gap:14px; box-shadow:var(--sh-sm); margin-bottom:8px; width:100%; text-align:left; transition:transform .15s; }
    .prof-menu-item:active { transform:scale(.98); }
    .prof-menu-ico { width:40px; height:40px; border-radius:var(--r-sm); display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
    .prof-menu-text { flex:1; }
    .prof-menu-text strong { display:block; font-size:.95rem; font-weight:800; color:var(--gray800); }
    .prof-menu-text span { font-size:.78rem; color:var(--gray400); }
    .prof-menu-arrow { color:var(--gray400); font-size:.9rem; }
    .logout-btn { width:calc(100% - 32px); margin:20px 16px; padding:16px; background:#fdecea; color:var(--danger); border-radius:var(--r-lg); font-size:1rem; font-weight:900; border:none; transition:transform .15s; }
    .logout-btn:active { transform:scale(.97); }

    /* ── SUBPAGES ── */
    .sub-page { min-height:100dvh; background:var(--gray100); }
    .sub-hdr { background:linear-gradient(135deg,var(--g800),var(--g600)); padding:52px 24px 24px; display:flex; align-items:center; gap:14px; }
    .sub-hdr h1 { font-size:1.4rem; font-weight:900; color:white; letter-spacing:-.3px; }
    .sub-back { background:rgba(255,255,255,.2); border-radius:50%; width:38px; height:38px; min-width:38px; display:flex; align-items:center; justify-content:center; }
    .sub-body { padding:20px 16px; display:flex; flex-direction:column; gap:14px; }
    .info-card { background:white; border-radius:var(--r-lg); padding:20px; box-shadow:var(--sh-sm); }
    .info-card h3 { font-size:.8rem; font-weight:700; color:var(--gray400); text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; }
    .toggle-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--gray200); }
    .toggle-row:last-child { border-bottom:none; padding-bottom:0; }
    .toggle-row span { font-size:.95rem; font-weight:700; color:var(--gray800); }
    .toggle { width:44px; height:24px; border-radius:100px; position:relative; transition:background .2s; border:none; }
    .toggle.on { background:var(--g500); }
    .toggle.off { background:var(--gray200); }
    .toggle-thumb { position:absolute; top:3px; width:18px; height:18px; border-radius:50%; background:white; transition:left .2s; box-shadow:0 1px 4px rgba(0,0,0,.2); }
    .toggle.on .toggle-thumb { left:23px; }
    .toggle.off .toggle-thumb { left:3px; }
    .save-btn { width:100%; padding:16px; background:linear-gradient(135deg,var(--g700),var(--g500)); color:white; border-radius:var(--r-lg); font-size:1rem; font-weight:900; box-shadow:0 4px 16px rgba(34,160,95,.35); }
    .faq-item { background:white; border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--sh-sm); }
    .faq-q { width:100%; padding:16px; display:flex; justify-content:space-between; align-items:center; background:none; text-align:left; font-size:.92rem; font-weight:800; color:var(--gray800); }
    .faq-a { padding:0 16px 16px; font-size:.88rem; color:var(--gray600); line-height:1.55; animation:fadeIn .2s ease; }
    .about-logo { display:flex; flex-direction:column; align-items:center; gap:12px; padding:24px; background:white; border-radius:var(--r-lg); box-shadow:var(--sh-sm); }
    .about-logo-icon { width:72px; height:72px; background:linear-gradient(135deg,var(--g800),var(--g500)); border-radius:20px; display:flex; align-items:center; justify-content:center; }
    .about-logo h2 { font-size:1.4rem; font-weight:900; color:var(--g800); }
    .about-logo p { font-size:.85rem; color:var(--gray400); font-weight:600; }
    .about-row { background:white; border-radius:var(--r-md); padding:14px 16px; display:flex; justify-content:space-between; box-shadow:var(--sh-sm); font-size:.9rem; }
    .about-row span:first-child { color:var(--gray600); font-weight:600; }
    .about-row span:last-child { color:var(--gray800); font-weight:800; }

    /* ── BOTTOM NAV ── */
    .bot-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:white; border-top:1px solid var(--gray200); display:flex; padding:8px 0 max(8px,env(safe-area-inset-bottom)); z-index:100; box-shadow:0 -4px 20px rgba(13,51,32,.08); }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; background:none; transition:transform .15s; }
    .nav-item:active { transform:scale(.9); }
    .nav-ico { display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:10px; transition:background .2s; }
    .nav-item.on .nav-ico { background:var(--g50); }
    .nav-lbl { font-size:.68rem; font-weight:700; color:var(--gray400); letter-spacing:.2px; }
    .nav-item.on .nav-lbl { color:var(--g700); }
  </style>

          <div className="sub-body">
            <div style={{display:'flex',gap:'10px'}}>
              <div className="stat-pill" style={{background:'var(--g100)',border:'1px solid var(--g300)'}}><span className="stat-num" style={{color:'var(--g700)'}}>{myReports.length}</span><span className="stat-lbl" style={{color:'var(--g600)'}}>Total</span></div>
              <div className="stat-pill" style={{background:'#edfaf3',border:'1px solid var(--g300)'}}><span className="stat-num" style={{color:'var(--g700)'}}>2</span><span className="stat-lbl" style={{color:'var(--g600)'}}>Resolved</span></div>
              <div className="stat-pill" style={{background:'#fff8e1',border:'1px solid #ffc107'}}><span className="stat-num" style={{color:'#e65100'}}>1</span><span className="stat-lbl" style={{color:'#e65100'}}>Pending</span></div>
            </div>
            {myReports.map(r=>(
              <div key={r.id} className="act-card">
                <div className="act-ico-wrap">{r.icon}</div>
                <div className="act-info">
                  <div className="act-top"><strong>{r.type}</strong><span className={`sbadge ${statusClass[r.status]}`}>{statusLabel[r.status]}</span></div>
                  <p className="act-loc">📍 {r.loc}</p>
                  <div className="act-meta"><span>🕐 {r.time}</span></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function HelpPage({ nav }) {
      const [open, setOpen] = useState(null);
      const faqs = [
        { q:'How do I report an issue?', a:'Tap the Report tab on the bottom nav, choose your issue type, fill in the location and details, then submit.' },
        { q:'How accurate is the truck tracker?', a:'The tracker shows approximate truck positions updated every few minutes based on the truck\'s last known location.' },
        { q:'How long does it take to resolve a report?', a:'Most reports are reviewed within 24–48 hours. You\'ll get a notification when the status changes.' },
        { q:'Can I cancel or edit a report?', a:'Currently you cannot edit a submitted report. Contact support if you need to make a correction.' },
        { q:'What is the segregation guide for?', a:'It helps you sort your waste correctly — biodegradable, recyclable, non-biodegradable, and special waste — before pickup.' },
      ];
      return (
        <div className="sub-page page-full">
          <SubHeader title="Help & Support" onBack={()=>nav('profile')}/>
          <div className="sub-body">
            <div className="info-card">
              <h3>Contact Us</h3>
              <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                <div style={{display:'flex',gap:'12px',alignItems:'center'}}><span style={{fontSize:'1.2rem'}}>📧</span><span style={{fontSize:'.9rem',fontWeight:'700',color:'var(--gray800)'}}>support@cleantrack.ph</span></div>
                <div style={{display:'flex',gap:'12px',alignItems:'center'}}><span style={{fontSize:'1.2rem'}}>📞</span><span style={{fontSize:'.9rem',fontWeight:'700',color:'var(--gray800)'}}>1-800-CLEAN-PH</span></div>
                <div style={{display:'flex',gap:'12px',alignItems:'center'}}><span style={{fontSize:'1.2rem'}}>🕐</span><span style={{fontSize:'.9rem',color:'var(--gray600)'}}>Mon–Fri, 8AM–5PM</span></div>
              </div>
            </div>
            <p style={{fontSize:'.8rem',fontWeight:'700',color:'var(--gray400)',textTransform:'uppercase',letterSpacing:'.5px'}}>Frequently Asked Questions</p>
            {faqs.map((f,i)=>(
              <div key={i} className="faq-item">
                <button className="faq-q" onClick={()=>setOpen(open===i?null:i)}>
                  <span>{f.q}</span>
                  <span style={{color:'var(--g600)',fontSize:'1.1rem'}}>{open===i?'−':'+'}</span>
                </button>
                {open===i && <p className="faq-a">{f.a}</p>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function AboutPage({ nav }) {
      return (
        <div className="sub-page page-full">
          <SubHeader title="About CleanTrack" onBack={()=>nav('profile')}/>
          <div className="sub-body">
            <div className="about-logo">
              <div className="about-logo-icon">
                <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
                  <path d="M12 30 Q18 18 24 22 Q30 26 36 14" stroke="white" strokeWidth="3" strokeLinecap="round" fill="none"/>
                  <circle cx="14" cy="34" r="3" fill="white"/>
                  <circle cx="28" cy="34" r="3" fill="white"/>
                  <rect x="10" y="30" width="22" height="6" rx="3" fill="white"/>
                </svg>
              </div>
              <h2>CleanTrack</h2>
              <p>Keep your neighborhood clean</p>
            </div>
            <div className="info-card">
              <h3>App Info</h3>
              <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                {[['Version','1.0.0'],['Build','2026.03.09'],['Platform','Web / Mobile'],['Developer','CleanTrack Team']].map(([k,v])=>(
                  <div key={k} className="about-row"><span>{k}</span><span>{v}</span></div>
                ))}
              </div>
            </div>
            <div className="info-card">
              <h3>About</h3>
              <p style={{fontSize:'.9rem',color:'var(--gray600)',lineHeight:'1.6'}}>CleanTrack is a community-powered waste management app designed to help residents track garbage trucks, report waste issues, and keep their neighborhoods clean. Built with care for local communities in the Philippines.</p>
            </div>
          </div>
        </div>
      );
    }

    function ProfilePage({ user, onLogout, nav }) {
      const menuItems = [
        { icon:'👤', bg:'#e8f5ee', label:'Edit Profile',      sub:'Update your name and info',    to:'edit-profile' },
        { icon:'🔔', bg:'#fff8ec', label:'Notifications',     sub:'Manage alert preferences',     to:'notifications' },
        { icon:'📍', bg:'#e8f0ff', label:'My Address',        sub:'Set your pickup location',     to:'my-address' },
        { icon:'📋', bg:'#edfaf3', label:'My Reports',        sub:'View reports you submitted',   to:'my-reports' },
        { icon:'❓', bg:'#fdecea', label:'Help & Support',    sub:'FAQs and contact us',          to:'help' },
        { icon:'ℹ️', bg:'#f4f6f4', label:'About CleanTrack', sub:'Version 1.0.0',                to:'about' },
      ];
      return (
        <div style={{background:'var(--gray100)',minHeight:'100dvh'}}>
          <div className="prof-hdr">
            <div className="prof-avatar">👤</div>
            <p className="prof-name">{user?.name || 'Resident'}</p>
            <p className="prof-email">{user?.email || 'user@example.com'}</p>
            <span className="prof-badge">🏘️ Barangay Member</span>
          </div>
          <div className="prof-stats">
            <div className="prof-stat"><span className="prof-stat-num">4</span><span className="prof-stat-lbl">Reports</span></div>
            <div className="prof-stat"><span className="prof-stat-num">2</span><span className="prof-stat-lbl">Resolved</span></div>
            <div className="prof-stat"><span className="prof-stat-num">12</span><span className="prof-stat-lbl">Days Active</span></div>
          </div>
          <div className="prof-section">
            <h3>Account</h3>
            {menuItems.map((item,i)=>(
              <button key={i} className="prof-menu-item" onClick={()=>nav(item.to)}>
                <div className="prof-menu-ico" style={{background:item.bg}}>{item.icon}</div>
                <div className="prof-menu-text"><strong>{item.label}</strong><span>{item.sub}</span></div>
                <span className="prof-menu-arrow">›</span>
              </button>
            ))}
          </div>
          <button className="logout-btn" onClick={onLogout}>Sign Out</button>
        </div>
      );
    }

    function BottomNav({ screen, nav }) {
      const items = [
        { id:'home', label:'Map', icon:(on)=>(
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M11 2C7.13 2 4 5.13 4 9c0 5.25 7 11 7 11s7-5.75 7-11c0-3.87-3.13-7-7-7z" fill={on?'var(--g600)':'none'} stroke={on?'var(--g600)':'var(--gray400)'} strokeWidth="1.8"/>
            <circle cx="11" cy="9" r="2.5" fill={on?'white':'var(--gray400)'}/>
          </svg>
        )},
        { id:'report', label:'Report', icon:(on)=>(
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <circle cx="11" cy="11" r="9" fill={on?'var(--g600)':'none'} stroke={on?'var(--g600)':'var(--gray400)'} strokeWidth="1.8"/>
            <path d="M11 7v5M11 15v.5" stroke={on?'white':'var(--gray400)'} strokeWidth="2" strokeLinecap="round"/>
          </svg>
        )},
        { id:'activities', label:'Activity', icon:(on)=>(
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <rect x="3" y="3" width="16" height="16" rx="4" fill={on?'var(--g600)':'none'} stroke={on?'var(--g600)':'var(--gray400)'} strokeWidth="1.8"/>
            <path d="M7 11h8M7 7.5h5M7 14.5h6" stroke={on?'white':'var(--gray400)'} strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
        )},
        { id:'profile', label:'Profile', icon:(on)=>(
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <circle cx="11" cy="8" r="4" fill={on?'var(--g600)':'none'} stroke={on?'var(--g600)':'var(--gray400)'} strokeWidth="1.8"/>
            <path d="M3 19c0-4 3.58-7 8-7s8 3 8 7" stroke={on?'var(--g600)':'var(--gray400)'} strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
        )},
      ];
      return (
        <nav className="bot-nav">
          {items.map(item=>(
            <button key={item.id} className={`nav-item ${screen===item.id?'on':''}`} onClick={()=>nav(item.id)}>
              <span className="nav-ico">{item.icon(screen===item.id)}</span>
              <span className="nav-lbl">{item.label}</span>
            </button>
          ))}
        </nav>
      );
    }

    function App() {
      const [screen, setScreen] = useState('startup');
      const [user, setUser] = useState(null);
      const nav = (to) => setScreen(to);
      const onLogin = (u) => { setUser(u); nav('home'); };
      const onLogout = () => { setUser(null); nav('startup'); };
      const showNav = ['home','report','activities','profile'].includes(screen);

      return (
        <div className="shell">
          <div className={showNav ? 'page' : 'page-full'} style={{flex:1,overflowY:'auto'}}>
            {screen==='startup'       && <StartupPage nav={nav}/>}
            {screen==='login'         && <LoginPage nav={nav} onLogin={onLogin}/>}
            {screen==='register'      && <RegisterPage nav={nav} onLogin={onLogin}/>}
            {screen==='home'          && <HomePage nav={nav} user={user}/>}
            {screen==='report'        && <ReportPage nav={nav}/>}
            {screen==='activities'    && <ActivitiesPage/>}
            {screen==='profile'       && <ProfilePage user={user} onLogout={onLogout} nav={nav}/>}
            {screen==='edit-profile'  && <EditProfilePage user={user} nav={nav}/>}
            {screen==='notifications' && <NotificationsPage nav={nav}/>}
            {screen==='my-address'    && <MyAddressPage nav={nav}/>}
            {screen==='my-reports'    && <MyReportsPage nav={nav}/>}
            {screen==='help'          && <HelpPage nav={nav}/>}
            {screen==='about'         && <AboutPage nav={nav}/>}
          </div>
          {showNav && <BottomNav screen={screen} nav={nav}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
